name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build deployment directory
        run: |
          mkdir -p _site/docs
          mkdir -p _site/src
          cp -r docs/. _site/docs/
          cp -r src/apg-api _site/src/apg-api
          cp -r src/apg-lib _site/src/apg-lib
          printf '<html><head><meta http-equiv="refresh" content="0;url=docs/"></head></html>\n' > _site/index.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
